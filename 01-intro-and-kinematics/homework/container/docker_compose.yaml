# REPO_ROOT must be absolute repo path (set by container/run.sh or autograder).
services:
  homework-tests:
    # Distinct tag so week 02 (same default project name "container") does not reuse this image.
    image: ai_in_robotics_01_intro_kinematics_hw_tests
    environment:
      GRADING_STUDENT_SUBMISSION: "0"
    build:
      context: ${REPO_ROOT}
      dockerfile: 01-intro-and-kinematics/homework/container/Dockerfile
    volumes:
      - ${REPO_ROOT}:/app:ro
      - ${REPO_ROOT}/dev/01-intro-and-kinematics/homework/reference_solution:/app/01-intro-and-kinematics/homework/reference_solution:ro
      - ${REPO_ROOT}/dev/01-intro-and-kinematics/homework/hidden_tests:/app/01-intro-and-kinematics/homework/hidden_tests:ro
    working_dir: /app/01-intro-and-kinematics/homework
